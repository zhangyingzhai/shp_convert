name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install geopandas fiona pyproj shapely customtkinter pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --collect-all geopandas
          --collect-all fiona
          --collect-all pyproj
          --collect-all shapely
          --name SHP_Converter
          shp_convert/convert.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SHP_Converter
          path: dist/SHP_Converter.exe
          retention-days: 30
